<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — La Mesa Chica</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-tabs {
      display: flex;
      gap: 4px;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 2rem;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--cream-muted);
      font-family: var(--font-body);
      font-size: 0.88rem;
      padding: 10px 18px;
      cursor: pointer;
      margin-bottom: -0.5px;
      transition: all 0.15s;
    }

    .tab-btn:hover { color: var(--cream); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Tabla de usuarios */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--cream-muted);
      padding: 8px 12px;
      border-bottom: 0.5px solid var(--border);
    }

    .data-table td {
      padding: 10px 12px;
      border-bottom: 0.5px solid var(--border);
      font-size: 0.85rem;
      color: var(--cream-muted);
      vertical-align: middle;
    }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg-raised); }

    .data-table .nombre-cell { color: var(--cream); font-weight: 500; }

    .select-inline {
      background: var(--bg-raised);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--cream);
      font-size: 0.8rem;
      padding: 4px 8px;
      font-family: var(--font-body);
      cursor: pointer;
    }

    /* Form agregar restaurante */
    .add-form {
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Tabla restaurantes admin */
    .resto-admin-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 6px;
    }

    .resto-admin-row .nombre { flex: 1; font-size: 0.9rem; color: var(--cream); font-weight: 500; }
    .resto-admin-row .meta  { font-size: 0.78rem; color: var(--cream-muted); }

    /* Salidas admin */
    .salida-admin-form {
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .checkbox-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-raised);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px 4px 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .checkbox-chip input { display: none; }
    .checkbox-chip.checked { border-color: var(--gold); background: var(--gold-subtle); color: var(--gold); }
    .checkbox-chip .avatar { width: 24px; height: 24px; font-size: 9px; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="home.html" class="navbar-brand">La Mesa Chica</a>
    <ul class="nav-links">
      <li><a href="home.html">Inicio</a></li>
      <li><a href="restaurantes.html">Restaurantes</a></li>
      <li><a href="sesiones.html">Sesiones</a></li>
    </ul>
    <a href="perfil.html" class="nav-avatar" id="navAvatar">?</a>
  </nav>

  <div class="page-wrapper">
    <div class="container">

      <div class="page-title">
        <h1>Panel admin</h1>
        <p>Gestión de usuarios, restaurantes y sesiones</p>
      </div>

      <div class="admin-tabs">
        <button class="tab-btn active" onclick="showTab('usuarios', this)">Usuarios</button>
        <button class="tab-btn" onclick="showTab('restaurantes', this)">Restaurantes</button>
        <button class="tab-btn" onclick="showTab('sesiones', this)">Sesiones</button>
      </div>

      <!-- TAB: Usuarios -->
      <div class="tab-panel active" id="tab-usuarios">
        <div class="card" style="overflow-x:auto">
          <table class="data-table" id="usersTable">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Apodo</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="5"><div class="loading">Cargando...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- TAB: Restaurantes -->
      <div class="tab-panel" id="tab-restaurantes">
        <!-- Form agregar -->
        <div class="add-form">
          <h3 style="font-family:var(--font-body);font-size:0.95rem;color:var(--cream);margin-bottom:1rem">Agregar restaurante</h3>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Nombre *</label>
              <input type="text" class="form-input" id="rNombre" placeholder="Don Julio">
            </div>
            <div class="form-group">
              <label class="form-label">Zona *</label>
              <input type="text" class="form-input" id="rZona" placeholder="Palermo">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Tipo de cocina *</label>
              <input type="text" class="form-input" id="rCocina" placeholder="Parrilla">
            </div>
            <div class="form-group">
              <label class="form-label">Dirección</label>
              <input type="text" class="form-input" id="rDireccion" placeholder="Guatemala 4699">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Link Google Maps</label>
            <input type="text" class="form-input" id="rMaps" placeholder="https://maps.google.com/...">
          </div>
          <button class="btn btn-primary" onclick="addRestaurante()">Agregar restaurante</button>
        </div>

        <!-- Lista -->
        <h3 style="font-family:var(--font-body);font-size:0.9rem;color:var(--cream-muted);margin-bottom:0.75rem">Restaurantes cargados</h3>
        <div id="restoAdminList">
          <div class="loading">Cargando...</div>
        </div>
      </div>

      <!-- TAB: Sesiones -->
      <div class="tab-panel" id="tab-sesiones">
        <!-- Form agregar salida -->
        <div class="salida-admin-form">
          <h3 style="font-family:var(--font-body);font-size:0.95rem;color:var(--cream);margin-bottom:1rem">
            Registrar salida
          </h3>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Restaurante</label>
              <select class="form-select" id="sResto">
                <option value="">— Sin definir —</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Fecha *</label>
              <input type="date" class="form-input" id="sFecha">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Precio por persona (USD)</label>
              <input type="number" class="form-input" id="sPrecio" placeholder="45">
            </div>
            <div class="form-group">
              <label class="form-label">Estado</label>
              <select class="form-select" id="sConfirmada">
                <option value="false">Próxima / tentativa</option>
                <option value="true">Confirmada / pasada</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Notas</label>
            <input type="text" class="form-input" id="sNotas" placeholder="Reserva a las 21hs, pedir el bife de chorizo">
          </div>
          <div class="form-group">
            <label class="form-label">Asistentes</label>
            <div class="checkbox-group" id="asistentesGroup">
              <!-- Se cargan dinámicamente -->
            </div>
          </div>
          <button class="btn btn-primary" onclick="addSalida()">Guardar salida</button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const client = initSupabase()
    let allUsers = []

    async function init() {
      const session = await requireAuth(client)
      if (!session) return

      const profile = await getUserProfile(client, session.user.id)
      document.getElementById('navAvatar').textContent = getInitials(profile?.apodo || profile?.nombre || '')

      // Solo admins pueden acceder
      if (!isAdmin(profile)) {
        document.querySelector('.container').innerHTML = `
          <div style="text-align:center;padding:4rem 1rem">
            <p style="font-size:1.5rem;margin-bottom:1rem">🔒</p>
            <h2 style="font-family:var(--font-body);color:var(--cream)">Acceso restringido</h2>
            <p style="margin-top:0.5rem">Solo los administradores pueden acceder a este panel.</p>
            <a href="home.html" class="btn btn-ghost" style="margin-top:1.5rem">Volver al inicio</a>
          </div>
        `
        return
      }

      // Fecha por defecto
      document.getElementById('sFecha').value = new Date().toISOString().split('T')[0]

      await Promise.all([loadUsers(), loadRestaurantesAdmin()])
    }

    function showTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      document.getElementById(`tab-${name}`).classList.add('active')
      btn.classList.add('active')
    }

    // ── USUARIOS ─────────────────────────────────────────
    async function loadUsers() {
      const { data } = await client.from('usuarios').select('*').order('nombre')
      allUsers = data || []
      renderUsersTable(data)
      renderAsistentesCheckboxes(data)
    }

    function renderUsersTable(users) {
      const body = document.getElementById('usersBody')
      if (!users || users.length === 0) {
        body.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No hay usuarios registrados.</p></div></td></tr>'
        return
      }
      body.innerHTML = ''
      users.forEach(u => {
        const tr = document.createElement('tr')
        tr.innerHTML = `
          <td class="nombre-cell">${u.nombre}</td>
          <td>${u.apodo || '—'}</td>
          <td>${u.email}</td>
          <td>
            <select class="select-inline" onchange="updateUser('${u.id}', 'rol', this.value)">
              <option value="member" ${u.rol === 'member' ? 'selected' : ''}>member</option>
              <option value="admin"  ${u.rol === 'admin'  ? 'selected' : ''}>admin</option>
            </select>
          </td>
          <td>
            <select class="select-inline" onchange="updateUser('${u.id}', 'estado', this.value)">
              <option value="active" ${u.estado === 'active' ? 'selected' : ''}>active</option>
              <option value="paused" ${u.estado === 'paused' ? 'selected' : ''}>paused</option>
            </select>
          </td>
        `
        body.appendChild(tr)
      })
    }

    async function updateUser(id, field, value) {
      const { error } = await client.from('usuarios').update({ [field]: value }).eq('id', id)
      if (error) showToast('Error al actualizar', 'error')
      else showToast('Usuario actualizado', 'success')
    }

    // ── RESTAURANTES ─────────────────────────────────────
    async function loadRestaurantesAdmin() {
      const { data } = await client.from('restaurantes').select('*').order('nombre')
      renderRestoAdmin(data)

      // Poblar selector de sesiones
      const sel = document.getElementById('sResto')
      sel.innerHTML = '<option value="">— Sin definir —</option>'
      if (data) {
        data.forEach(r => {
          const opt = document.createElement('option')
          opt.value = r.id
          opt.textContent = `${r.nombre} (${r.zona})`
          sel.appendChild(opt)
        })
      }
    }

    function renderRestoAdmin(data) {
      const container = document.getElementById('restoAdminList')
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No hay restaurantes cargados.</p></div>'
        return
      }
      container.innerHTML = ''
      data.forEach(r => {
        const row = document.createElement('div')
        row.className = 'resto-admin-row'
        row.innerHTML = `
          <div style="flex:1">
            <div class="nombre">${r.nombre}</div>
            <div class="meta">${r.zona} · ${r.tipo_cocina}</div>
          </div>
          <span class="tag ${r.activo ? 'tag-gold' : ''}">${r.activo ? 'activo' : 'inactivo'}</span>
          <button class="btn btn-ghost" style="font-size:0.75rem;padding:4px 10px" onclick="toggleActivo('${r.id}', ${r.activo}, this)">
            ${r.activo ? 'Desactivar' : 'Activar'}
          </button>
        `
        container.appendChild(row)
      })
    }

    async function addRestaurante() {
      const nombre   = document.getElementById('rNombre').value.trim()
      const zona     = document.getElementById('rZona').value.trim()
      const cocina   = document.getElementById('rCocina').value.trim()
      const dir      = document.getElementById('rDireccion').value.trim()
      const maps     = document.getElementById('rMaps').value.trim()

      if (!nombre || !zona || !cocina) {
        showToast('Nombre, zona y tipo de cocina son obligatorios', 'error')
        return
      }

      const { error } = await client.from('restaurantes').insert({
        nombre, zona, tipo_cocina: cocina,
        direccion: dir || null,
        google_maps: maps || null
      })

      if (error) { showToast('Error al agregar', 'error'); return }

      showToast('Restaurante agregado', 'success')
      document.getElementById('rNombre').value = ''
      document.getElementById('rZona').value   = ''
      document.getElementById('rCocina').value = ''
      document.getElementById('rDireccion').value = ''
      document.getElementById('rMaps').value   = ''
      await loadRestaurantesAdmin()
    }

    async function toggleActivo(id, current, btn) {
      const { error } = await client.from('restaurantes').update({ activo: !current }).eq('id', id)
      if (error) { showToast('Error', 'error'); return }
      btn.textContent = current ? 'Activar' : 'Desactivar'
      showToast('Restaurante actualizado', 'success')
      await loadRestaurantesAdmin()
    }

    // ── SALIDAS ──────────────────────────────────────────
    function renderAsistentesCheckboxes(users) {
      const group = document.getElementById('asistentesGroup')
      if (!users) return
      group.innerHTML = ''
      users.forEach(u => {
        const chip = document.createElement('label')
        chip.className = 'checkbox-chip'
        chip.dataset.id = u.id
        const nombre = u.apodo || u.nombre || '?'
        chip.innerHTML = `
          <input type="checkbox" value="${u.id}">
          <div class="avatar">${getInitials(nombre)}</div>
          <span>${nombre}</span>
        `
        chip.addEventListener('click', () => {
          chip.classList.toggle('checked')
        })
        group.appendChild(chip)
      })
    }

    async function addSalida() {
      const restoId     = document.getElementById('sResto').value || null
      const fecha       = document.getElementById('sFecha').value
      const precioVal   = document.getElementById('sPrecio').value
      const confirmada  = document.getElementById('sConfirmada').value === 'true'
      const notas       = document.getElementById('sNotas').value.trim()

      if (!fecha) { showToast('La fecha es obligatoria', 'error'); return }

      const asistentes = [...document.querySelectorAll('.checkbox-chip.checked input')]
        .map(inp => inp.value)

      const payload = {
        restaurante_id: restoId,
        fecha,
        confirmada,
        asistentes,
        precio_por_persona: precioVal ? parseFloat(precioVal) : null,
        notas: notas || null
      }

      const { error } = await client.from('salidas').insert(payload)
      if (error) { showToast('Error al guardar', 'error'); return }

      showToast('Salida guardada', 'success')
      document.getElementById('sFecha').value    = new Date().toISOString().split('T')[0]
      document.getElementById('sPrecio').value   = ''
      document.getElementById('sNotas').value    = ''
      document.querySelectorAll('.checkbox-chip').forEach(c => c.classList.remove('checked'))
    }

    init()
  </script>
</body>
</html>
